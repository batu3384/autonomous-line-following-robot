<svg width="1600" height="1360" viewBox="0 0 1600 1360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="72" y1="56" x2="1500" y2="1220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141D30"/>
      <stop offset="1" stop-color="#0A1019"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 120) rotate(28) scale(460 300)">
      <stop stop-color="#223250"/>
      <stop offset="1" stop-color="#223250" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1370 1180) rotate(180) scale(420 260)">
      <stop stop-color="#122237"/>
      <stop offset="1" stop-color="#122237" stop-opacity="0"/>
    </radialGradient>
    <filter id="shellShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#030812" flood-opacity="0.32"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#020711" flood-opacity="0.26"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#79A6FF"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#FFB34A"/>
    </marker>
    <marker id="arrowCoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#FF7A5A"/>
    </marker>
    <marker id="arrowMint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#39D6A0"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#93A2C7"/>
    </marker>
    <style>
      .eyebrow { fill: #9EB3D8; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
      .title { fill: #F6F8FF; font-family: Georgia, "Times New Roman", serif; font-size: 58px; font-weight: 700; letter-spacing: -0.04em; }
      .subtitle { fill: #A8B8D5; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 24px; }
      .section-label { fill: #96A8CB; font-family: "Courier New", monospace; font-size: 16px; font-weight: 700; letter-spacing: 0.12em; }
      .card-title { fill: #F6F8FF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 28px; font-weight: 700; }
      .card-body { fill: #9FB2D2; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 20px; }
      .chip-text { fill: #EDF3FF; font-family: "Courier New", monospace; font-size: 20px; font-weight: 700; }
      .decision-title { fill: #F2F6FF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .decision-code { fill: #B7C8E6; font-family: "Courier New", monospace; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .branch { fill: #F7FBFF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
      .loop-label { fill: #8FA4CC; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
      .footer-note { fill: #8EA2C7; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 18px; }
    </style>
  </defs>

  <rect width="1600" height="1360" fill="#09101A"/>
  <rect width="1600" height="1360" fill="url(#glowTop)"/>
  <rect width="1600" height="1360" fill="url(#glowBottom)"/>

  <rect x="32" y="32" width="1536" height="1296" rx="34" fill="url(#bg)" stroke="#22304A" stroke-width="2" filter="url(#shellShadow)"/>

  <path d="M96 108H152" stroke="#FFB34A" stroke-width="6" stroke-linecap="round"/>
  <text x="172" y="114" class="eyebrow">runtime flow</text>
  <text x="96" y="186" class="title">robby.py branch order</text>
  <text x="96" y="226" class="subtitle">A clean flowchart of the real Raspberry Pi control loop, in the same order the source file evaluates each branch.</text>

  <g filter="url(#cardShadow)">
    <rect x="1056" y="84" width="152" height="52" rx="18" fill="#152239" stroke="#263650"/>
    <rect x="1224" y="84" width="216" height="52" rx="18" fill="#152239" stroke="#263650"/>
    <rect x="1056" y="150" width="384" height="52" rx="18" fill="#152239" stroke="#263650"/>
  </g>
  <text x="1084" y="116" class="chip-text">speed = 0.8</text>
  <text x="1252" y="116" class="chip-text">distance &lt; 10 cm</text>
  <text x="1084" y="182" class="chip-text">timeout fallback: 999 cm</text>

  <g filter="url(#cardShadow)">
    <rect x="356" y="286" width="888" height="114" rx="26" fill="#101A2C" stroke="#2C3C59" stroke-width="2"/>
  </g>
  <text x="392" y="330" class="section-label">Step 00</text>
  <text x="392" y="364" class="card-title">Read distance and both line sensors</text>
  <text x="392" y="394" class="card-body">distance = measure_distance()   ·   left_detect = int(not left_sensor.value)   ·   right_detect = int(not right_sensor.value)</text>

  <path d="M800 402V454" stroke="#79A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <polygon points="800,470 1028,580 800,690 572,580" fill="#0F1930" stroke="#4E70AA" stroke-width="3" filter="url(#cardShadow)"/>
  <text x="800" y="566" class="decision-title">Both sensors read 0</text>
  <text x="800" y="604" class="decision-title">and distance &gt; 10?</text>
  <text x="800" y="644" class="decision-code">left_detect == 0 and right_detect == 0 and distance &gt; 10</text>

  <path d="M1028 580H1080" stroke="#FFB34A" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <rect x="1032" y="540" width="54" height="30" rx="15" fill="#FFB34A"/>
  <text x="1047" y="561" class="branch">YES</text>

  <g filter="url(#cardShadow)">
    <rect x="1106" y="512" width="332" height="130" rx="24" fill="#141F31" stroke="#FFB34A" stroke-width="3"/>
    <rect x="1150" y="668" width="244" height="52" rx="18" fill="#152239" stroke="#2E3F5D" stroke-width="2"/>
  </g>
  <text x="1136" y="548" class="section-label">01</text>
  <text x="1136" y="584" class="card-title">Stop and continue</text>
  <text x="1136" y="616" class="card-body">robot.stop() + both LEDs low.</text>
  <text x="1180" y="700" class="chip-text">continue loop</text>
  <path d="M1272 642V660" stroke="#FFB34A" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAmber)"/>

  <path d="M800 690V736" stroke="#79A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <rect x="764" y="702" width="48" height="30" rx="15" fill="#1A2943"/>
  <text x="778" y="724" class="branch">NO</text>

  <polygon points="800,752 1028,862 800,972 572,862" fill="#0F1930" stroke="#4E70AA" stroke-width="3" filter="url(#cardShadow)"/>
  <text x="800" y="848" class="decision-title">Is distance &lt; 10?</text>
  <text x="800" y="890" class="decision-code">strict obstacle threshold</text>
  <text x="800" y="926" class="decision-code">distance &lt; 10</text>

  <path d="M1028 862H1080" stroke="#FF7A5A" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowCoral)"/>
  <rect x="1032" y="822" width="54" height="30" rx="15" fill="#FF7A5A"/>
  <text x="1047" y="843" class="branch">YES</text>

  <g filter="url(#cardShadow)">
    <rect x="1106" y="792" width="332" height="158" rx="24" fill="#141F31" stroke="#FF7A5A" stroke-width="3"/>
    <rect x="1150" y="976" width="244" height="52" rx="18" fill="#152239" stroke="#2E3F5D" stroke-width="2"/>
  </g>
  <text x="1136" y="828" class="section-label">02</text>
  <text x="1136" y="864" class="card-title">Obstacle stop</text>
  <text x="1136" y="896" class="card-body">robot.stop() + both LEDs high</text>
  <text x="1136" y="924" class="card-body">+ horn_sound() + continue.</text>
  <text x="1180" y="1008" class="chip-text">continue loop</text>
  <path d="M1272 950V968" stroke="#FF7A5A" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowCoral)"/>

  <path d="M800 972V1018" stroke="#79A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <rect x="764" y="984" width="48" height="30" rx="15" fill="#1A2943"/>
  <text x="778" y="1006" class="branch">NO</text>

  <polygon points="800,1034 1028,1144 800,1254 572,1144" fill="#0F1930" stroke="#4E70AA" stroke-width="3" filter="url(#cardShadow)"/>
  <text x="800" y="1132" class="decision-title">Does either sensor read 1?</text>
  <text x="800" y="1174" class="decision-code">left_detect == 1 or right_detect == 1</text>

  <path d="M1028 1144H1080" stroke="#39D6A0" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <rect x="1032" y="1104" width="54" height="30" rx="15" fill="#39D6A0"/>
  <text x="1047" y="1125" class="branch">YES</text>

  <path d="M572 1144H520" stroke="#93A2C7" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <rect x="524" y="1104" width="48" height="30" rx="15" fill="#93A2C7"/>
  <text x="537" y="1125" class="branch">NO</text>

  <g filter="url(#cardShadow)">
    <rect x="166" y="1088" width="308" height="116" rx="24" fill="#131D30" stroke="#93A2C7" stroke-width="3"/>
  </g>
  <text x="198" y="1124" class="section-label">03A</text>
  <text x="198" y="1158" class="card-title">Stay stopped</text>
  <text x="198" y="1188" class="card-body">robot.stop() + both LEDs low.</text>

  <g filter="url(#cardShadow)">
    <rect x="1106" y="1088" width="332" height="116" rx="24" fill="#141F31" stroke="#39D6A0" stroke-width="3"/>
  </g>
  <text x="1136" y="1124" class="section-label">03B</text>
  <text x="1136" y="1158" class="card-title">Move forward</text>
  <text x="1136" y="1188" class="card-body">robot.forward(0.8) + LEDs low.</text>

  <path d="M320 1204V1240H650" stroke="#93A2C7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowSlate)"/>
  <path d="M1272 1204V1240H950" stroke="#39D6A0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowMint)"/>

  <g filter="url(#cardShadow)">
    <rect x="650" y="1240" width="300" height="62" rx="22" fill="#152239" stroke="#2E3F5D" stroke-width="2"/>
  </g>
  <text x="708" y="1280" class="chip-text">time.sleep(0.05)</text>

  <path d="M650 1272H228V580H356" stroke="#5A79AF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10" marker-end="url(#arrowBlue)"/>
  <text x="124" y="660" transform="rotate(-90 124 660)" class="loop-label">next loop cycle</text>
</svg>
