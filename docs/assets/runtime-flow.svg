<svg width="1600" height="1480" viewBox="0 0 1600 1480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shell" x1="48" y1="40" x2="1524" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141D2E"/>
      <stop offset="1" stop-color="#0A1018"/>
    </linearGradient>
    <radialGradient id="glowOne" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 120) rotate(24) scale(520 360)">
      <stop stop-color="#1F3150"/>
      <stop offset="1" stop-color="#1F3150" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTwo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1360 1340) rotate(180) scale(420 260)">
      <stop stop-color="#102137"/>
      <stop offset="1" stop-color="#102137" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020711" flood-opacity="0.34"/>
    </filter>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#78A6FF"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#FFB44E"/>
    </marker>
    <marker id="arrCoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#FF7E61"/>
    </marker>
    <marker id="arrMint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#3ED9A6"/>
    </marker>
    <marker id="arrSlate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#93A3C7"/>
    </marker>
    <style>
      .eyebrow { fill: #A2B5D6; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
      .title { fill: #F6F8FF; font-family: Georgia, "Times New Roman", serif; font-size: 58px; font-weight: 700; letter-spacing: -0.04em; }
      .subtitle { fill: #AAB8D1; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 23px; }
      .step { fill: #93A7CA; font-family: "Courier New", monospace; font-size: 16px; font-weight: 700; letter-spacing: 0.12em; }
      .boxTitle { fill: #F4F8FF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 30px; font-weight: 700; }
      .boxBody { fill: #A2B4D4; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 20px; }
      .diamondTitle { fill: #F4F8FF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 27px; font-weight: 700; text-anchor: middle; }
      .chipText { fill: #EFF4FF; font-family: "Courier New", monospace; font-size: 19px; font-weight: 700; }
      .branch { fill: #F7FBFF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
      .loop { fill: #91A4CA; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1600" height="1480" fill="#09101A"/>
  <rect width="1600" height="1480" fill="url(#glowOne)"/>
  <rect width="1600" height="1480" fill="url(#glowTwo)"/>

  <rect x="32" y="32" width="1536" height="1416" rx="34" fill="url(#shell)" stroke="#22314A" stroke-width="2" filter="url(#shadow)"/>

  <path d="M88 108H144" stroke="#FFB44E" stroke-width="6" stroke-linecap="round"/>
  <text x="164" y="114" class="eyebrow">runtime flow</text>
  <text x="88" y="186" class="title">robby.py branch order</text>
  <text x="88" y="226" class="subtitle">The actual decision sequence from the Raspberry Pi script, with clean branch routing and no inferred behavior.</text>

  <g filter="url(#shadow)">
    <rect x="1064" y="84" width="154" height="50" rx="18" fill="#152239" stroke="#2A3A58"/>
    <rect x="1232" y="84" width="218" height="50" rx="18" fill="#152239" stroke="#2A3A58"/>
    <rect x="1064" y="148" width="386" height="50" rx="18" fill="#152239" stroke="#2A3A58"/>
  </g>
  <text x="1092" y="116" class="chipText">speed = 0.8</text>
  <text x="1260" y="116" class="chipText">distance &lt; 10 cm</text>
  <text x="1092" y="180" class="chipText">timeout fallback: 999 cm</text>

  <g filter="url(#shadow)">
    <rect x="284" y="280" width="760" height="108" rx="24" fill="#101A2B" stroke="#2E3E5E" stroke-width="2"/>
  </g>
  <text x="324" y="324" class="step">Step 00</text>
  <text x="324" y="358" class="boxTitle">Read distance and both line sensors</text>
  <text x="324" y="386" class="boxBody">distance = measure_distance() · left_detect = int(not left_sensor.value) · right_detect = int(not right_sensor.value)</text>

  <path d="M664 388V450" stroke="#78A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrBlue)"/>

  <polygon points="664,468 874,578 664,688 454,578" fill="#0F1930" stroke="#4C70AB" stroke-width="3" filter="url(#shadow)"/>
  <text x="664" y="558" class="diamondTitle">Both line sensors are inactive</text>
  <text x="664" y="596" class="diamondTitle">and distance is above 10 cm?</text>

  <path d="M874 578H1018" stroke="#FFB44E" stroke-width="6" stroke-linecap="round" marker-end="url(#arrAmber)"/>
  <rect x="914" y="536" width="56" height="30" rx="15" fill="#FFB44E"/>
  <text x="930" y="557" class="branch">YES</text>

  <g filter="url(#shadow)">
    <rect x="1044" y="510" width="360" height="120" rx="24" fill="#141F31" stroke="#FFB44E" stroke-width="3"/>
  </g>
  <text x="1078" y="548" class="step">01</text>
  <text x="1078" y="584" class="boxTitle">Stop and continue</text>
  <text x="1078" y="616" class="boxBody">robot.stop() + both LEDs low.</text>

  <g filter="url(#shadow)">
    <rect x="1100" y="660" width="248" height="48" rx="18" fill="#152239" stroke="#2A3A58"/>
  </g>
  <text x="1130" y="691" class="chipText">continue loop</text>
  <path d="M1224 632V650" stroke="#FFB44E" stroke-width="6" stroke-linecap="round" marker-end="url(#arrAmber)"/>

  <path d="M664 688V810" stroke="#78A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrBlue)"/>
  <rect x="628" y="742" width="50" height="30" rx="15" fill="#1B2841"/>
  <text x="643" y="763" class="branch">NO</text>

  <polygon points="664,828 874,938 664,1048 454,938" fill="#0F1930" stroke="#4C70AB" stroke-width="3" filter="url(#shadow)"/>
  <text x="664" y="928" class="diamondTitle">Is the obstacle closer</text>
  <text x="664" y="966" class="diamondTitle">than 10 cm?</text>

  <path d="M874 938H1018" stroke="#FF7E61" stroke-width="6" stroke-linecap="round" marker-end="url(#arrCoral)"/>
  <rect x="914" y="904" width="56" height="30" rx="15" fill="#FF7E61"/>
  <text x="930" y="925" class="branch">YES</text>

  <g filter="url(#shadow)">
    <rect x="1044" y="878" width="360" height="150" rx="24" fill="#141F31" stroke="#FF7E61" stroke-width="3"/>
  </g>
  <text x="1078" y="916" class="step">02</text>
  <text x="1078" y="952" class="boxTitle">Obstacle stop</text>
  <text x="1078" y="984" class="boxBody">robot.stop() + both LEDs high</text>
  <text x="1078" y="1012" class="boxBody">+ horn_sound() + continue.</text>

  <g filter="url(#shadow)">
    <rect x="1100" y="1056" width="248" height="48" rx="18" fill="#152239" stroke="#2A3A58"/>
  </g>
  <text x="1130" y="1087" class="chipText">continue loop</text>
  <path d="M1224 1030V1046" stroke="#FF7E61" stroke-width="6" stroke-linecap="round" marker-end="url(#arrCoral)"/>

  <path d="M664 1048V1168" stroke="#78A6FF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrBlue)"/>
  <rect x="628" y="1104" width="50" height="30" rx="15" fill="#1B2841"/>
  <text x="643" y="1125" class="branch">NO</text>

  <polygon points="664,1188 874,1298 664,1408 454,1298" fill="#0F1930" stroke="#4C70AB" stroke-width="3" filter="url(#shadow)"/>
  <text x="664" y="1288" class="diamondTitle">Is either line sensor</text>
  <text x="664" y="1326" class="diamondTitle">currently active?</text>

  <path d="M874 1298H1018" stroke="#3ED9A6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrMint)"/>
  <rect x="914" y="1264" width="56" height="30" rx="15" fill="#3ED9A6"/>
  <text x="930" y="1285" class="branch">YES</text>

  <path d="M454 1298H320" stroke="#93A3C7" stroke-width="6" stroke-linecap="round" marker-end="url(#arrSlate)"/>
  <rect x="350" y="1264" width="48" height="30" rx="15" fill="#93A3C7"/>
  <text x="364" y="1285" class="branch">NO</text>

  <g filter="url(#shadow)">
    <rect x="92" y="1248" width="232" height="120" rx="24" fill="#131D30" stroke="#93A3C7" stroke-width="3"/>
  </g>
  <text x="124" y="1286" class="step">03A</text>
  <text x="124" y="1322" class="boxTitle">Stay stopped</text>
  <text x="124" y="1354" class="boxBody">robot.stop() + LEDs low.</text>

  <g filter="url(#shadow)">
    <rect x="1044" y="1248" width="360" height="120" rx="24" fill="#141F31" stroke="#3ED9A6" stroke-width="3"/>
  </g>
  <text x="1078" y="1286" class="step">03B</text>
  <text x="1078" y="1322" class="boxTitle">Move forward</text>
  <text x="1078" y="1354" class="boxBody">robot.forward(0.8) + LEDs low.</text>

  <path d="M208 1368V1410H602" stroke="#93A3C7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrSlate)"/>
  <path d="M1224 1368V1410H886" stroke="#3ED9A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrMint)"/>

  <g filter="url(#shadow)">
    <rect x="602" y="1380" width="284" height="56" rx="22" fill="#152239" stroke="#2A3A58"/>
  </g>
  <text x="658" y="1416" class="chipText">time.sleep(0.05)</text>

  <path d="M602 1408H208V578H284" stroke="#5877AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10" marker-end="url(#arrBlue)"/>
  <text x="118" y="684" transform="rotate(-90 118 684)" class="loop">next loop cycle</text>
</svg>
