<svg width="1600" height="1400" viewBox="0 0 1600 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="64" y1="54" x2="1518" y2="1346" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2E9"/>
      <stop offset="1" stop-color="#EEE5D7"/>
    </linearGradient>
    <radialGradient id="washA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 120) rotate(21) scale(520 260)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1390 1240) rotate(180) scale(380 240)">
      <stop stop-color="#E6DACA"/>
      <stop offset="1" stop-color="#E6DACA" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#BCA98F" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#476C9E"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#D78A30"/>
    </marker>
    <marker id="arrowCoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#D4654F"/>
    </marker>
    <marker id="arrowMint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2F9D7E"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#7A869E"/>
    </marker>
    <style>
      .eyebrow { fill: #88785F; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
      .title { fill: #1F2B3F; font-family: Georgia, "Times New Roman", serif; font-size: 60px; font-weight: 700; letter-spacing: -0.04em; }
      .subtitle { fill: #596579; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 24px; }
      .label { fill: #758099; font-family: "Courier New", monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.12em; }
      .cardTitle { fill: #1E2A40; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 30px; font-weight: 700; }
      .cardBody { fill: #556176; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 20px; }
      .actionBody { fill: #556176; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 18px; }
      .sideTitle { fill: #1E2A40; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; }
      .sideBody { fill: #5C677B; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 18px; }
      .diamondText { fill: #1F2B3F; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .chipText { fill: #22304A; font-family: "Courier New", monospace; font-size: 18px; font-weight: 700; }
      .branch { fill: #FFFFFF; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
      .loopText { fill: #69758D; font-family: "Trebuchet MS", "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1600" height="1400" fill="#ECE4D8"/>
  <rect width="1600" height="1400" fill="url(#washA)"/>
  <rect width="1600" height="1400" fill="url(#washB)"/>

  <rect x="32" y="32" width="1536" height="1336" rx="34" fill="url(#paper)" stroke="#D6C8B6" stroke-width="2"/>
  <rect x="48" y="48" width="1504" height="1304" rx="28" stroke="#E8DED1"/>

  <path d="M88 110H148" stroke="#D78A30" stroke-width="6" stroke-linecap="round"/>
  <text x="168" y="116" class="eyebrow">runtime flow</text>
  <text x="88" y="190" class="title">robby.py branch order</text>
  <text x="88" y="232" class="subtitle">A calmer diagram of the Raspberry Pi loop, arranged as a readable sequence instead of a crowded code dump.</text>

  <g filter="url(#cardShadow)">
    <rect x="1050" y="84" width="154" height="48" rx="16" fill="#FFF9F1" stroke="#D8C9B5"/>
    <rect x="1218" y="84" width="220" height="48" rx="16" fill="#FFF9F1" stroke="#D8C9B5"/>
    <rect x="1050" y="146" width="388" height="48" rx="16" fill="#FFF9F1" stroke="#D8C9B5"/>
  </g>
  <text x="1080" y="115" class="chipText">speed = 0.8</text>
  <text x="1248" y="115" class="chipText">distance &lt; 10 cm</text>
  <text x="1080" y="177" class="chipText">timeout fallback: 999 cm</text>

  <g filter="url(#cardShadow)">
    <rect x="88" y="316" width="292" height="180" rx="24" fill="#FFF9F1" stroke="#DCCDBA"/>
    <rect x="88" y="522" width="292" height="180" rx="24" fill="#FFF9F1" stroke="#DCCDBA"/>
    <rect x="88" y="728" width="292" height="180" rx="24" fill="#FFF9F1" stroke="#DCCDBA"/>
    <rect x="88" y="934" width="292" height="180" rx="24" fill="#FFF9F1" stroke="#DCCDBA"/>
  </g>

  <rect x="112" y="340" width="58" height="8" rx="4" fill="#476C9E"/>
  <text x="112" y="386" class="sideTitle">Sensor Read</text>
  <text x="112" y="418" class="sideBody">The loop samples distance first.</text>
  <text x="112" y="444" class="sideBody">Then both line sensors become</text>
  <text x="112" y="470" class="sideBody">0 or 1 states.</text>

  <rect x="112" y="546" width="58" height="8" rx="4" fill="#D78A30"/>
  <text x="112" y="592" class="sideTitle">Early Exit</text>
  <text x="112" y="624" class="sideBody">The first two branches end</text>
  <text x="112" y="650" class="sideBody">the cycle with continue.</text>

  <rect x="112" y="752" width="58" height="8" rx="4" fill="#D4654F"/>
  <text x="112" y="798" class="sideTitle">Strict Threshold</text>
  <text x="112" y="830" class="sideBody">Obstacle logic is strict.</text>
  <text x="112" y="856" class="sideBody">It checks distance &lt; 10 only.</text>

  <rect x="112" y="958" width="58" height="8" rx="4" fill="#2F9D7E"/>
  <text x="112" y="1004" class="sideTitle">Motion Model</text>
  <text x="112" y="1036" class="sideBody">No steering correction layer.</text>
  <text x="112" y="1062" class="sideBody">The robot moves forward</text>
  <text x="112" y="1088" class="sideBody">or stays stopped.</text>

  <g filter="url(#cardShadow)">
    <rect x="450" y="310" width="760" height="140" rx="24" fill="#FFFDF8" stroke="#D7C8B6"/>
  </g>
  <text x="488" y="350" class="label">Step 00</text>
  <text x="488" y="382" class="cardTitle">Read distance and both line sensors</text>
  <text x="488" y="408" class="cardBody">distance = measure_distance() · left_detect = int(not left_sensor.value)</text>
  <text x="488" y="434" class="cardBody">right_detect = int(not right_sensor.value)</text>

  <path d="M830 450V490" stroke="#476C9E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>

  <polygon points="830,514 1020,610 830,706 640,610" fill="#F8FBFF" stroke="#476C9E" stroke-width="3"/>
  <text x="830" y="600" class="diamondText">Both sensors inactive</text>
  <text x="830" y="634" class="diamondText">and distance &gt; 10 cm?</text>

  <path d="M1020 610H1088" stroke="#D78A30" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <rect x="1014" y="568" width="56" height="28" rx="14" fill="#D78A30"/>
  <text x="1031" y="588" class="branch">YES</text>

  <g filter="url(#cardShadow)">
    <rect x="1100" y="540" width="356" height="138" rx="24" fill="#FFF9F1" stroke="#D78A30" stroke-width="3"/>
    <rect x="1268" y="704" width="126" height="42" rx="16" fill="#F7EFE4" stroke="#D8C8B5"/>
  </g>
  <text x="1132" y="578" class="label">01</text>
  <text x="1132" y="614" class="cardTitle">Stop and continue</text>
  <text x="1132" y="644" class="actionBody">robot.stop() + LEDs low.</text>
  <text x="1132" y="668" class="actionBody">Immediate restart.</text>
  <text x="1290" y="731" class="chipText">continue</text>
  <path d="M1332 678V698" stroke="#D78A30" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>

  <path d="M830 706V804" stroke="#476C9E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <rect x="794" y="742" width="48" height="28" rx="14" fill="#6E7C94"/>
  <text x="808" y="762" class="branch">NO</text>

  <polygon points="830,822 1020,918 830,1014 640,918" fill="#F8FBFF" stroke="#476C9E" stroke-width="3"/>
  <text x="830" y="908" class="diamondText">Obstacle closer</text>
  <text x="830" y="942" class="diamondText">than 10 cm?</text>

  <path d="M1020 918H1088" stroke="#D4654F" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowCoral)"/>
  <rect x="1014" y="876" width="56" height="28" rx="14" fill="#D4654F"/>
  <text x="1031" y="896" class="branch">YES</text>

  <g filter="url(#cardShadow)">
    <rect x="1100" y="852" width="356" height="156" rx="24" fill="#FFF9F1" stroke="#D4654F" stroke-width="3"/>
    <rect x="1268" y="1038" width="126" height="42" rx="16" fill="#F7EFE4" stroke="#D8C8B5"/>
  </g>
  <text x="1132" y="890" class="label">02</text>
  <text x="1132" y="926" class="cardTitle">Obstacle stop</text>
  <text x="1132" y="956" class="actionBody">robot.stop() + LEDs high.</text>
  <text x="1132" y="980" class="actionBody">horn_sound(), then restart.</text>
  <text x="1290" y="1065" class="chipText">continue</text>
  <path d="M1332 1008V1030" stroke="#D4654F" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowCoral)"/>

  <path d="M830 1014V1110" stroke="#476C9E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <rect x="794" y="1050" width="48" height="28" rx="14" fill="#6E7C94"/>
  <text x="808" y="1070" class="branch">NO</text>

  <polygon points="830,1128 1020,1224 830,1320 640,1224" fill="#F8FBFF" stroke="#476C9E" stroke-width="3"/>
  <text x="830" y="1214" class="diamondText">Any line sensor</text>
  <text x="830" y="1248" class="diamondText">currently active?</text>

  <path d="M1020 1224H1088" stroke="#2F9D7E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowMint)"/>
  <rect x="1014" y="1182" width="56" height="28" rx="14" fill="#2F9D7E"/>
  <text x="1031" y="1202" class="branch">YES</text>

  <path d="M640 1224H486" stroke="#7A869E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <rect x="508" y="1182" width="48" height="28" rx="14" fill="#7A869E"/>
  <text x="522" y="1202" class="branch">NO</text>

  <g filter="url(#cardShadow)">
    <rect x="88" y="1162" width="292" height="120" rx="24" fill="#FFF9F1" stroke="#7A869E" stroke-width="3"/>
  </g>
  <text x="120" y="1198" class="label">03A</text>
  <text x="120" y="1234" class="cardTitle">Stay stopped</text>
  <text x="120" y="1264" class="cardBody">robot.stop() + LEDs low.</text>

  <g filter="url(#cardShadow)">
    <rect x="1100" y="1162" width="348" height="120" rx="24" fill="#FFF9F1" stroke="#2F9D7E" stroke-width="3"/>
  </g>
  <text x="1132" y="1198" class="label">03B</text>
  <text x="1132" y="1234" class="cardTitle">Move forward</text>
  <text x="1132" y="1264" class="cardBody">robot.forward(speed) + LEDs low.</text>

  <path d="M234 1282V1334H646" stroke="#7A869E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowSlate)"/>
  <path d="M1372 1282V1334H954" stroke="#2F9D7E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowMint)"/>

  <g filter="url(#cardShadow)">
    <rect x="646" y="1322" width="308" height="56" rx="22" fill="#FFF9F1" stroke="#D7C8B6"/>
  </g>
  <text x="706" y="1358" class="chipText">time.sleep(0.05)</text>

  <path d="M646 1350H430V594" stroke="#476C9E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 10"/>
  <text x="428" y="632" class="loopText" transform="rotate(-90 428 632)">next loop cycle</text>
</svg>
